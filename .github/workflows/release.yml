name: .NET Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-plugins:
    name: Build Plugins
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Plugin SDK
        uses: actions/checkout@v5
        with:
          repository: RadiatorTwo/LoupixDeck.PluginSdk
          path: src/LoupixDeck.PluginSdk

      - name: Checkout OBS plugin
        uses: actions/checkout@v5
        with:
          repository: RadiatorTwo/LoupixDeck.Plugin.Obs
          path: src/LoupixDeck.Plugin.Obs

      - name: Checkout Elgato plugin
        uses: actions/checkout@v5
        with:
          repository: RadiatorTwo/LoupixDeck.Plugin.Elgato
          path: src/LoupixDeck.Plugin.Elgato

      - name: Checkout HWiNFO plugin
        uses: actions/checkout@v5
        with:
          repository: RadiatorTwo/LoupixDeck.Plugin.HwInfo
          path: src/LoupixDeck.Plugin.HwInfo

      - name: Checkout CoolerControl plugin
        uses: actions/checkout@v5
        with:
          repository: RadiatorTwo/LoupixDeck.Plugin.CoolerControl
          path: src/LoupixDeck.Plugin.CoolerControl

      - name: Checkout Audio plugin
        uses: actions/checkout@v5
        with:
          repository: RadiatorTwo/LoupixDeck.Plugin.Audio
          path: src/LoupixDeck.Plugin.Audio

      - name: Checkout Argus plugin
        uses: actions/checkout@v5
        with:
          repository: RadiatorTwo/LoupixDeck.Plugin.Argus
          path: src/LoupixDeck.Plugin.Argus

      - name: Checkout SpotifyPremium plugin
        uses: actions/checkout@v5
        with:
          repository: RadiatorTwo/LoupixDeck.Plugin.SpotifyPremium
          path: src/LoupixDeck.Plugin.SpotifyPremium

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Build Plugin SDK package
        run: dotnet build src/LoupixDeck.PluginSdk -c Release

      - name: Build and assemble plugins
        run: |
          set -euo pipefail
          mkdir -p plugins
          for repo in \
            LoupixDeck.Plugin.Obs \
            LoupixDeck.Plugin.Elgato \
            LoupixDeck.Plugin.HwInfo \
            LoupixDeck.Plugin.CoolerControl \
            LoupixDeck.Plugin.Audio \
            LoupixDeck.Plugin.Argus \
            LoupixDeck.Plugin.SpotifyPremium
          do
            echo "::group::Building $repo"
            manifest="src/$repo/plugin.json"
            id=$(jq -r '.id' "$manifest")
            if [ -z "$id" ] || [ "$id" = "null" ]; then
              echo "Plugin $repo has no 'id' in plugin.json" >&2
              exit 1
            fi
            dotnet build "src/$repo/$repo.csproj" -c Release -o "build/$repo" /p:DebugSymbols=false /p:DebugType=none
            mkdir -p "plugins/$id"
            find "build/$repo" -mindepth 1 -maxdepth 1 ! -name '*.pdb' ! -name '*.runtimeconfig.json' -exec cp -r {} "plugins/$id/" \;
            cp "$manifest" "plugins/$id/plugin.json"
            echo "::endgroup::"
          done
          echo "Assembled plugins:"
          ls -R plugins

      - name: Upload plugins artifact
        uses: actions/upload-artifact@v7
        with:
          name: plugins
          path: plugins

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: build-plugins

    env:
      PROJECT_PATH: ./LoupixDeck/LoupixDeck.csproj

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Extract version from tag
        run: |
          $tag = "$env:GITHUB_REF"
          $version = $tag -replace 'refs/tags/v', ''
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Debug version
        run: echo "Set version to $env:VERSION"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore $env:PROJECT_PATH

      - name: Publish for Windows
        run: |
          dotnet publish $env:PROJECT_PATH -c Release -r win-x64 --self-contained true `
            /p:PublishSingleFile=true `
            /p:PublishTrimmed=false `
            /p:EnableCompressionInSingleFile=true `
            /p:ReadyToRun=true `
            /p:Version=$env:VERSION `
            -o publish/win-x64

      - name: Download plugins artifact
        uses: actions/download-artifact@v8
        with:
          name: plugins
          path: plugins-artifact

      - name: Bundle plugins into publish output
        run: |
          New-Item -ItemType Directory -Force -Path publish/win-x64/plugins | Out-Null
          Copy-Item -Path plugins-artifact/* -Destination publish/win-x64/plugins -Recurse -Force

      - name: Zip Windows build
        run: |
          Get-ChildItem -Path publish/win-x64 -Filter *.pdb -Recurse | Remove-Item -Force
          Compress-Archive -Path publish/win-x64/* -DestinationPath LoupixDeck-win-x64.zip

      - name: Upload Windows zip to release
        uses: softprops/action-gh-release@v3
        with:
          files: LoupixDeck-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: build-plugins

    env:
      PROJECT_PATH: ./LoupixDeck/LoupixDeck.csproj

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish for Linux
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} -c Release -r linux-x64 --self-contained true \
            /p:PublishSingleFile=true \
            /p:PublishTrimmed=false \
            /p:EnableCompressionInSingleFile=true \
            /p:ReadyToRun=true \
            /p:Version=${{ env.VERSION }} \
            -o publish/linux-x64

      - name: Download plugins artifact
        uses: actions/download-artifact@v8
        with:
          name: plugins
          path: plugins-artifact

      - name: Bundle plugins into publish output
        run: |
          mkdir -p publish/linux-x64/plugins
          cp -r plugins-artifact/. publish/linux-x64/plugins/

      - name: Tar Linux build
        run: |
          find publish/linux-x64 -name '*.pdb' -delete
          cd publish/linux-x64
          tar -czvf ../../LoupixDeck-linux-x64.tar.gz .

      - name: Upload Linux tar.gz to release
        uses: softprops/action-gh-release@v3
        with:
          files: LoupixDeck-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
